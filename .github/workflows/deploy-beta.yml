name: CI/CD DataNordeste Beta

on:
  push:
    branches: ["main"]

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update Docker metadata with the tag
        uses: docker/metadata-action@v4
        id: meta
        with:
          images: ${{ vars.DOCKER_IMAGE_BETA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          file: Dockerfile.production
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ${{ vars.DOCKER_IMAGE_BETA }}:latest
            ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_CONTENTFUL_SPACE=${{ secrets.NEXT_PUBLIC_CONTENTFUL_SPACE }}
            NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN=${{ secrets.NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN_PREVIEW }}
            NEXT_PUBLIC_HOST_URL=${{ vars.NEXT_PUBLIC_HOST_URL_BETA }}
            NEXT_PUBLIC_CONTENTFUL_PREVIEW=${{ vars.NEXT_PUBLIC_CONTENTFUL_PREVIEW }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_RECAPTCHA_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_KEY }}
            NEXT_PUBLIC_SURVEY_FEEDBACK_URL=${{ secrets.NEXT_PUBLIC_SURVEY_FEEDBACK_URL }}
            NEXT_PUBLIC_APP_ENV=beta

  push-beta:
    name: Deploy beta on ${{ matrix.runner }}
    needs: build-image

    strategy:
      fail-fast: false
      matrix:
        runner:
          - beta-runner
          - gamma-runner

    runs-on:
      - self-hosted
      - ${{ matrix.runner }}

    steps:
      - name: Pull the latest image
        run: |
          sudo docker pull ${{ vars.DOCKER_IMAGE_BETA }}:latest

      - name: Create Docker network if it does not exist
        run: |
          sudo docker network inspect ${{ vars.NETWORK_NAME }} >/dev/null 2>&1 \
            || sudo docker network create ${{ vars.NETWORK_NAME }}

      - name: Stop existing container
        run: |
          sudo docker rm -f ${{ vars.CONTAINER_NAME_BETA }} || true

      - name: Run new container
        run: |
          sudo docker run \
            --name ${{ vars.CONTAINER_NAME_BETA }} \
            --restart unless-stopped \
            --network ${{ vars.NETWORK_NAME }} \
            -p ${{ vars.HOST_PORT_BETA }}:${{ vars.CONTAINER_PORT }} \
            -d \
            ${{ vars.DOCKER_IMAGE_BETA }}:latest

      - name: Check container status
        run: |
          sudo docker ps \
            --filter "name=${{ vars.CONTAINER_NAME_BETA }}"

      - name: Prune unused Docker images
        run: |
          sudo docker image prune -f
